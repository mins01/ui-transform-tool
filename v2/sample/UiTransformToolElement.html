    <script type="module">
        import UiTransformToolElement from '../src/UiTransformToolElement.js';
        UiTransformToolElement.defineCustomElement();

    <style>
        .transform-tool-target{
            left: var(--left,0) !important;
            top: var(--top,0) !important;
            width: var(--width,0) !important;
            height: var(--height,0) !important;
            transform: rotate(var(--rotation,0deg)) !important;
        }


    </style>

<body>
    <div class="container py-3" id="container0">
        <h1>Sample - UiTransformToolElement</h1>
        <hr>
        <div>
            HTMLElement 클래스를 상속받아 커스텀 엘레멘트를 만들고 그것이 transform toolпп럼 동작하게 한다.
        </div>
        <hr>
        <h2>ex</h2>
        <div class="my-3" >
            <button type="button" class="btn btn-primary btn-sm" onclick="tft01.dataset.resizeOrigin = 'edge'">data-resize-origin="edge"</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="tft01.dataset.resizeOrigin = 'center'">data-resize-origin="center"</button>
        </div>
        <div class="my-3" style="height: 200vh;" >
            <div class="d-flex gap-3 flex-wrap">
                <div class="transform-tool-target rounded text-bg-success box-shadow" style="--width:200px;--height:200px;" onclick="tft01.setTarget(this);">1</div>
                <div class="transform-tool-target rounded text-bg-success box-shadow" style="--width:200px;--height:200px;" onclick="tft01.setTarget(this);">2</div>
                <div class="transform-tool-target rounded text-bg-success box-shadow" style="--width:200px;--height:200px;" onclick="tft01.setTarget(this);">3</div>
                <div class="transform-tool-target rounded text-bg-success box-shadow" style="--width:200px;--height:200px;" onclick="tft01.setTarget(this);">4</div>
                <div class="transform-tool-target rounded text-bg-success box-shadow" style="--width:200px;--height:200px;" onclick="tft01.setTarget(this);">5</div>    
            </div>
            <div class="transform-tool-target position-absolute rounded  box-shadow text-bg-primary" style="--width:200px;--height:200px;--left:400px;--top:200px;" onclick="tft01.setTarget(this);">setTarget</div>
            <div class="transform-tool-target position-absolute rounded  box-shadow text-bg-info" style="--width:80px;--height:80px;--left:100px;--top:100px;" onclick="tft01.setTarget(this);">setTarget</div>
            <div class="transform-tool-target position-absolute rounded  box-shadow text-bg-info" style="--width:80px;--height:80px;--left:100px;--top:200px;" data-transform-tool-no-sync onclick="tft01.setTarget(this);">data-transform-tool-no-sync target 연결민하고 싱크 동작 안한다. event 에서 따로 처리.</div>
            
            
            <div class="transform-boundary" style="background-color: #abc9; height: 500px;margin:50px">
                <ui-transform-tool style="min-width:20px;min-height:20px;" left="50" top="50" width="123" height="214"></ui-transform-tool>
            </div>        

        </div>
    </div>
    
        
    

    <ui-transform-tool id="tft01" class="show-when-has-target" style="min-width:20px;min-height:20px;" left="100" top="300" width="123" height="214"></ui-transform-tool>

    <script>
        let syncTarget = null
        const tft01 = document.getElementById("tft01");
 
        const fn1 = (e) => { const target = e.target
            console.log(e.type,target.left,target.top,target.width,target.height,target.rotation,event.detail) 
        };
        tft01.addEventListener('transform-start', fn1);
        tft01.addEventListener('transform-update', fn1);
        tft01.addEventListener('transform-end', fn1);
        tft01.addEventListener('transform-target-change', fn1);
        tft01.addEventListener('transform-target-sync', fn1);
        window.addEventListener('click', (e) => {
            if(!e.target.matches('.transform-tool-target, ui-transform-tool')){ tft01.setTarget(null); return false; } 
        });

        // 이벤트 수동 처리. 동작 종료 후 적용한다.
        tft01.addEventListener('transform-end', (e) => {  
            if(e.detail.target && e.detail.target.hasAttribute('data-transform-tool-no-sync')){
                tft01.syncTo(e.detail.target);
                return; 
            }
        });
        
    </script>
</body>
